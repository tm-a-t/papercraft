real_ip_header X-Forwarded-For;
real_ip_recursive on;

server {
  listen 80;
  root /dist;
  try_files $uri $uri.html $uri/index.html =404;

  location = /ru {
    return 301 /;
  }

  location /book {
    rewrite_by_lua_block {
      local nf_lang = ngx.var.cookie_nf_lang or ""
      local http_lang = ngx.var.http_accept_language or ""
      if 
        (nf_lang == "" and http_lang:sub(0, 2):lower() == "ru") 
        or (nf_lang:sub(0, 2):lower() == "ru")
      then
        return ngx.redirect("/ru" .. ngx.var.request_uri)
      end
    }
    try_files $uri $uri.html $uri/index.html =404;
  }
}
